services:
  # Base de datos de desarrollo
  db:
    image: postgres:15-alpine
    container_name: difactura-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/schema/001_create_tables.sql:/docker-entrypoint-initdb.d/02-tables.sql
      - ./database/schema/002_create_indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
      - ./database/schema/003_seed_data.sql:/docker-entrypoint-initdb.d/04-seed.sql
      - ./database/schema/004_json_persistence.sql:/docker-entrypoint-initdb.d/05-json-persistence.sql
      - ./database/schema/005_empresa_users.sql:/docker-entrypoint-initdb.d/06-empresa-users.sql
      - ./database/schema/006_seed_empresa_user.sql:/docker-entrypoint-initdb.d/07-seed-empresa.sql
      - ./database/schema/007_factura_correlativo.sql:/docker-entrypoint-initdb.d/08-factura-correlativo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - difactura-net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difactura-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      AI_SERVICE_URL: http://ai-service-vision:8001
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-300000}
      AI_SERVICE_RETRIES: ${AI_SERVICE_RETRIES:-0}
      COMPANY_ADDITIONAL_TAX_IDS: ${COMPANY_ADDITIONAL_TAX_IDS:-}
      PROCESSING_POLL_INTERVAL_MS: ${PROCESSING_POLL_INTERVAL_MS:-3000}
      PROCESSING_JOB_STALE_MS: ${PROCESSING_JOB_STALE_MS:-900000}
      PROCESSING_JOB_RECOVERY_INTERVAL_MS: ${PROCESSING_JOB_RECOVERY_INTERVAL_MS:-30000}
      PROCESSING_JOB_MAX_RECOVERIES: ${PROCESSING_JOB_MAX_RECOVERIES:-2}
      STORAGE_PATH: /app/storage
      MAX_FILE_SIZE: 10485760
      BCRYPT_SALT_ROUNDS: 12
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

  # Motor documental v2 (desactivado — directorio no disponible)
  # ai-service:
  #   build:
  #     context: ./ai-service-v2
  #     dockerfile: Dockerfile

  # Frontend de desarrollo
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: difactura-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    networks:
      - difactura-net

  # Proxy solo para produccion
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: difactura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - difactura-net
    profiles:
      - production

  ai-service-vision:
    build:
      context: ./ai-service-vision
      dockerfile: Dockerfile
    container_name: difactura-ai-vision
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-120}
      MAX_FILE_SIZE_MB: 50
      MAX_PAGES: 8
      IMAGE_DPI: 300
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service-vision/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

volumes:
  pgdata:
    driver: local

networks:
  difactura-net:
    driver: bridge
