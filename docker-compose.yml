services:
  # Base de datos de desarrollo
  db:
    image: postgres:15-alpine
    container_name: difactura-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/schema/001_create_tables.sql:/docker-entrypoint-initdb.d/02-tables.sql
      - ./database/schema/002_create_indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
      - ./database/schema/003_seed_data.sql:/docker-entrypoint-initdb.d/04-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - difactura-net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difactura-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      AI_SERVICE_URL: http://ai-service-vision:8001
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-300000}
      AI_SERVICE_RETRIES: ${AI_SERVICE_RETRIES:-0}
      COMPANY_ADDITIONAL_TAX_IDS: ${COMPANY_ADDITIONAL_TAX_IDS:-}
      PROCESSING_POLL_INTERVAL_MS: ${PROCESSING_POLL_INTERVAL_MS:-3000}
      PROCESSING_JOB_STALE_MS: ${PROCESSING_JOB_STALE_MS:-900000}
      PROCESSING_JOB_RECOVERY_INTERVAL_MS: ${PROCESSING_JOB_RECOVERY_INTERVAL_MS:-30000}
      PROCESSING_JOB_MAX_RECOVERIES: ${PROCESSING_JOB_MAX_RECOVERIES:-2}
      STORAGE_PATH: /app/storage
      MAX_FILE_SIZE: 10485760
      BCRYPT_SALT_ROUNDS: 12
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

  # Motor documental v2
  ai-service:
    build:
      context: ./ai-service-v2
      dockerfile: Dockerfile
    container_name: difactura-ai
    restart: unless-stopped
    environment:
      TESSERACT_PATH: /usr/bin/tesseract
      OCR_LANGUAGE: spa
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-true}
      PADDLE_TEXT_DET_LIMIT_SIDE_LEN: ${PADDLE_TEXT_DET_LIMIT_SIDE_LEN:-2500}
      DOCUMENT_PARSER_PROVIDER: ${DOCUMENT_PARSER_PROVIDER:-local}
      DOCUMENT_PARSER_FORCE_PROVIDER: ${DOCUMENT_PARSER_FORCE_PROVIDER:-}
      DOCUMENT_PARSER_FALLBACK_ENABLED: ${DOCUMENT_PARSER_FALLBACK_ENABLED:-true}
      DOCUMENT_PARSER_FALLBACK_PROVIDER: ${DOCUMENT_PARSER_FALLBACK_PROVIDER:-local}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-ocr-latest}
      MISTRAL_FILE_VISIBILITY: ${MISTRAL_FILE_VISIBILITY:-workspace}
      MISTRAL_EXTRACT_HEADER: ${MISTRAL_EXTRACT_HEADER:-true}
      MISTRAL_EXTRACT_FOOTER: ${MISTRAL_EXTRACT_FOOTER:-true}
      MISTRAL_TABLE_FORMAT: ${MISTRAL_TABLE_FORMAT:-markdown}
      DOC_AI_ENABLED: ${DOC_AI_ENABLED:-false}
      DOC_AI_PROVIDER: ${DOC_AI_PROVIDER:-openai}
      DOC_AI_BASE_URL: ${DOC_AI_BASE_URL:-https://api.openai.com}
      DOC_AI_API_KEY: ${DOC_AI_API_KEY:-}
      DOC_AI_MODEL: ${DOC_AI_MODEL:-gpt-4.1-mini}
      DOC_AI_TIMEOUT_SECONDS: ${DOC_AI_TIMEOUT_SECONDS:-30}
      DOC_AI_FALLBACK_CONFIDENCE_THRESHOLD: ${DOC_AI_FALLBACK_CONFIDENCE_THRESHOLD:-0.48}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service-v2/app:/app/app
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - difactura-net

  # Motor visual — OpenAI Vision directo (sin OCR local, sin GPU)
  ai-vision:
    build:
      context: ./ai-service-vision
      dockerfile: Dockerfile
    container_name: difactura-ai-vision
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-120}
      MAX_PAGES: ${VISION_MAX_PAGES:-8}
      IMAGE_DPI: ${VISION_IMAGE_DPI:-150}
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service-vision/app:/app/app
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

  # Frontend de desarrollo
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: difactura-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    networks:
      - difactura-net

  # Proxy solo para produccion
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: difactura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
      - frontend
    networks:
      - difactura-net
    profiles:
      - production

  # Motor visual nuevo — OpenAI Vision, sin GPU, sin OCR local
  ai-service-vision:
    build:
      context: ./ai-service-vision
      dockerfile: Dockerfile
    container_name: difactura-ai-vision
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-120}
      MAX_FILE_SIZE_MB: 50
      MAX_PAGES: 8
      IMAGE_DPI: 150
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service-vision/app:/app/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

volumes:
  pgdata:
    driver: local

networks:
  difactura-net:
    driver: bridge
