services:
  # Base de datos de desarrollo
  db:
    image: postgres:15-alpine
    container_name: difactura-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/schema/001_create_tables.sql:/docker-entrypoint-initdb.d/02-tables.sql
      - ./database/schema/002_create_indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
      - ./database/schema/003_seed_data.sql:/docker-entrypoint-initdb.d/04-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - difactura-net

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: difactura-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_TIMEOUT_MS: ${AI_SERVICE_TIMEOUT_MS:-300000}
      AI_SERVICE_RETRIES: ${AI_SERVICE_RETRIES:-0}
      PROCESSING_POLL_INTERVAL_MS: ${PROCESSING_POLL_INTERVAL_MS:-3000}
      PROCESSING_JOB_STALE_MS: ${PROCESSING_JOB_STALE_MS:-900000}
      PROCESSING_JOB_RECOVERY_INTERVAL_MS: ${PROCESSING_JOB_RECOVERY_INTERVAL_MS:-30000}
      PROCESSING_JOB_MAX_RECOVERIES: ${PROCESSING_JOB_MAX_RECOVERIES:-2}
      STORAGE_PATH: /app/storage
      MAX_FILE_SIZE: 10485760
      BCRYPT_SALT_ROUNDS: 12
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - difactura-net

  # Motor documental
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: difactura-ai
    restart: unless-stopped
    environment:
      TESSERACT_PATH: /usr/bin/tesseract
      OCR_LANGUAGE: spa
      CONFIDENCE_THRESHOLD: 0.7
      PADDLE_OCR_ENABLED: ${PADDLE_OCR_ENABLED:-true}
      PADDLE_TEXT_DET_LIMIT_SIDE_LEN: ${PADDLE_TEXT_DET_LIMIT_SIDE_LEN:-2500}
      DOCUMENT_PARSER_PROVIDER: ${DOCUMENT_PARSER_PROVIDER:-local}
      DOCUMENT_PARSER_FORCE_PROVIDER: ${DOCUMENT_PARSER_FORCE_PROVIDER:-}
      DOCUMENT_PARSER_FALLBACK_ENABLED: ${DOCUMENT_PARSER_FALLBACK_ENABLED:-true}
      DOCUMENT_PARSER_FALLBACK_PROVIDER: ${DOCUMENT_PARSER_FALLBACK_PROVIDER:-local}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-ocr-latest}
      MISTRAL_FILE_VISIBILITY: ${MISTRAL_FILE_VISIBILITY:-workspace}
      MISTRAL_EXTRACT_HEADER: ${MISTRAL_EXTRACT_HEADER:-true}
      MISTRAL_EXTRACT_FOOTER: ${MISTRAL_EXTRACT_FOOTER:-true}
      MISTRAL_TABLE_FORMAT: ${MISTRAL_TABLE_FORMAT:-markdown}
      DOC_AI_ENABLED: ${DOC_AI_ENABLED:-false}
      DOC_AI_PROVIDER: ${DOC_AI_PROVIDER:-heuristic}
      DOC_AI_BASE_URL: ${DOC_AI_BASE_URL:-http://ollama-service:11434}
      DOC_AI_API_KEY: ${DOC_AI_API_KEY:-}
      DOC_AI_MODEL: ${DOC_AI_MODEL:-qwen2.5:3b}
      DOC_AI_TIMEOUT_SECONDS: ${DOC_AI_TIMEOUT_SECONDS:-300}
      DOC_AI_MAX_PAGES: ${DOC_AI_MAX_PAGES:-4}
      DOC_AI_KEEP_ALIVE: ${DOC_AI_KEEP_ALIVE:-10m}
      DOC_AI_SELECTIVE_ENABLED: ${DOC_AI_SELECTIVE_ENABLED:-true}
      DOC_AI_FALLBACK_CONFIDENCE_THRESHOLD: ${DOC_AI_FALLBACK_CONFIDENCE_THRESHOLD:-0.48}
      DOC_AI_FALLBACK_MISSING_REQUIRED_THRESHOLD: ${DOC_AI_FALLBACK_MISSING_REQUIRED_THRESHOLD:-3}
      DOC_AI_FALLBACK_WARNING_THRESHOLD: ${DOC_AI_FALLBACK_WARNING_THRESHOLD:-4}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/benchmarks:/app/benchmarks
      - ./ai-service/tests:/app/tests
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ai/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - difactura-net

  # Soporte local para la via complementaria selectiva del motor documental
  ollama-service:
    image: ollama/ollama:latest
    container_name: difactura-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${DOC_AI_KEEP_ALIVE:-10m}
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - difactura-net
    profiles:
      - doc-ai-text

  # Opcion futura de modelo visual local; hoy no forma parte del flujo normal de desarrollo
  llm-service:
    image: vllm/vllm-openai:latest
    container_name: difactura-llm
    restart: unless-stopped
    command:
      - --model
      - ${DOC_AI_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${DOC_AI_API_KEY:-difactura-local}
      - --gpu-memory-utilization
      - ${DOC_AI_GPU_MEMORY_UTILIZATION:-0.9}
      - --limit-mm-per-prompt
      - '{"image":4,"video":0}'
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8001:8000"
    volumes:
      - ./models/huggingface:/root/.cache/huggingface
    ipc: host
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Authorization: Bearer ${DOC_AI_API_KEY:-difactura-local}\" http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - difactura-net
    profiles:
      - doc-ai-vlm

  # Frontend de desarrollo
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: difactura-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    networks:
      - difactura-net

  # Proxy solo para produccion
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: difactura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
      - frontend
    networks:
      - difactura-net
    profiles:
      - production

volumes:
  pgdata:
    driver: local

networks:
  difactura-net:
    driver: bridge
